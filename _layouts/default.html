<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Language" content="zh-Hans">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="icon" type="image/png" href="/assets/logo.png">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="alternate" hreflang="zh-Hans" href="{{ page.url | absolute_url }}">
  {% seo %}
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml">
  <style>
    :root { --navy: #0B1F3A; --paper: #F1ECE2; --orange: #FF7A2F; --orange-ink: #E85E10; --rule: #C9C0AE; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--paper); color: var(--navy); font-family: "Noto Serif SC", Georgia, serif; line-height: 1.7; }
    header { background: var(--navy); color: var(--paper); padding: 2rem 1.25rem; }
    header .inner { max-width: 760px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
    header img { width: 48px; height: 48px; }
    header h1 { font-size: 1.5rem; margin: 0; }
    header .tagline { font-size: 0.85rem; opacity: 0.8; margin: 0.2rem 0 0; font-family: "Work Sans", sans-serif; letter-spacing: 0.05em; }
    nav { max-width: 760px; margin: 0 auto; padding: 1rem 1.25rem; font-family: "Work Sans", sans-serif; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; display: flex; gap: 1.5rem; border-bottom: 1px solid var(--rule); }
    nav a { color: var(--navy); text-decoration: none; }
    nav a:hover { color: var(--orange-ink); }
    main { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem; }
    article { margin-bottom: 3rem; }
    article h2, article h1 { font-weight: 600; line-height: 1.25; }
    article h2 a { color: var(--navy); text-decoration: none; }
    article h2 a:hover { color: var(--orange-ink); }
    article .meta { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 0.8rem; color: var(--navy); opacity: 0.6; letter-spacing: 0.03em; }
    article .source { font-size: 0.85rem; margin-top: 1rem; }
    article .source a { color: var(--orange-ink); }
    article img { max-width: 100%; height: auto; display: block; margin: 1.5rem auto; }
    footer { max-width: 760px; margin: 2rem auto; padding: 1.5rem 1.25rem 3rem; border-top: 1px solid var(--rule); color: var(--navy); opacity: 0.7; font-size: 0.85rem; font-family: "Work Sans", sans-serif; }
    footer a { color: var(--orange-ink); }
    hr { border: 0; border-top: 1px solid var(--rule); margin: 2rem 0; }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <img src="/assets/logo.png" alt="硅谷中转站">
      <div>
        <h1><a href="/" style="color:inherit;text-decoration:none;">{{ site.title }}</a></h1>
        <p class="tagline">{{ site.description }}</p>
      </div>
    </div>
  </header>
  <nav>
    <a href="/">首页</a>
    <a href="/archive/">存档</a>
    <a href="https://www.facebook.com/svtransit1" rel="noopener">FB</a>
    <a href="https://x.com/svtransit1" rel="noopener">X</a>
    <a href="/feed.xml">RSS</a>
  </nav>
  <main>{{ content }}</main>
  <footer>
    © {{ site.time | date: '%Y' }} 硅谷中转站 · 追踪全球 AI 最前线 · FB <a href="https://www.facebook.com/svtransit1">@svtransit1</a> · X <a href="https://x.com/svtransit1">@svtransit1</a>
  </footer>
</body>
</html>
