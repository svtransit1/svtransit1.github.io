---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <p class="meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time> · {{ page.topic_tags | join: ' · ' }}</p>
  {% if page.hero %}<img src="{{ page.hero }}" alt="{{ page.title }}">{% endif %}
  {{ content }}
  {% if page.source %}
    <p class="source">原始来源：<a href="{{ page.source }}" rel="external nofollow noopener">{{ page.source }}</a></p>
  {% endif %}
  <hr>
  <p style="font-size:0.9rem;">关注 <a href="https://www.facebook.com/svtransit1">@svtransit1</a> · 每 3 小时一篇 AI 前线 · <a href="/feed.xml">RSS</a></p>
</article>

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "TechArticle",
  "headline": {{ page.title | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "inLanguage": "zh-Hans",
  "author": { "@type": "Organization", "name": "硅谷中转站" },
  "publisher": { "@type": "Organization", "name": "硅谷中转站", "url": "{{ site.url }}" },
  "mainEntityOfPage": "{{ page.url | absolute_url }}"
  {% if page.source %}, "citation": {{ page.source | jsonify }}{% endif %}
  {% if page.hero %}, "image": "{{ page.hero | absolute_url }}"{% endif %}
}
</script>
